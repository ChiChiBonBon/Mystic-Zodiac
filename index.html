<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Mystic Zodiac × MBTI ｜ 占星命運神殿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1F3B;
    --ink-deep:#12142b;
    --gold:#D4AF37;
    --gold-soft:#e8cf7e;
    --ivory:#F7F3E9;
    --ivory-shadow:#e6ddc4;
    --wine:#6b2b3a;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:
      radial-gradient(ellipse at 20% 0%, #262b52 0%, transparent 55%),
      radial-gradient(ellipse at 85% 15%, #2a2050 0%, transparent 50%),
      linear-gradient(180deg, var(--ink-deep) 0%, var(--ink) 45%, #0e1024 100%);
    color:var(--ivory);
    font-family:"Noto Serif TC", serif;
    overflow-x:hidden;
  }

  /* ---------- starfield ---------- */
  #stars, #stars2, #stars3{
    position:fixed; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:0;
  }

  /* ---------- floating magic particles ---------- */
  .particle{
    position:fixed;
    width:3px; height:3px;
    background:var(--gold-soft);
    border-radius:50%;
    box-shadow:0 0 6px 2px rgba(212,175,55,0.7);
    animation:float-up linear infinite;
    pointer-events:none;
    z-index:1;
    opacity:0;
  }
  @keyframes float-up{
    0%{ transform:translateY(0) translateX(0); opacity:0;}
    10%{ opacity:0.9;}
    90%{ opacity:0.5;}
    100%{ transform:translateY(-110vh) translateX(20px); opacity:0;}
  }

  /* ---------- layout ---------- */
  .wrap{
    position:relative;
    z-index:2;
    max-width:760px;
    margin:0 auto;
    padding:56px 20px 100px;
  }

  /* ---------- sigil / astrolabe (signature element) ---------- */
  .sigil{
    position:relative;
    width:150px; height:150px;
    margin:0 auto 18px;
  }
  .sigil svg{ width:100%; height:100%; }
  .sigil .ring-outer{
    animation:spin 60s linear infinite;
    transform-origin:75px 75px;
  }
  .sigil .ring-inner{
    animation:spin-rev 40s linear infinite;
    transform-origin:75px 75px;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  @keyframes spin-rev{ to{ transform:rotate(-360deg);} }

  /* ---------- header ---------- */
  h1.title{
    font-family:"Cinzel Decorative", "Cinzel", serif;
    text-align:center;
    font-size:clamp(28px, 5vw, 42px);
    letter-spacing:2px;
    margin:0 0 6px;
    color:var(--gold-soft);
    text-shadow:0 0 18px rgba(212,175,55,0.45), 0 0 2px rgba(0,0,0,0.6);
  }
  p.subtitle{
    text-align:center;
    font-family:"Cinzel", serif;
    font-size:13px;
    letter-spacing:4px;
    color:#b9b6d6;
    margin:0 0 44px;
    text-transform:uppercase;
  }

  /* ---------- selection panel ---------- */
  .altar{
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border:1px solid rgba(212,175,55,0.35);
    border-radius:18px;
    padding:32px 28px;
    backdrop-filter:blur(2px);
    box-shadow:0 0 0 1px rgba(0,0,0,0.2) inset, 0 20px 50px -20px rgba(0,0,0,0.6);
  }

  .field{
    margin-bottom:20px;
  }
  .field label{
    display:block;
    font-family:"Cinzel", serif;
    font-size:12px;
    letter-spacing:3px;
    color:var(--gold-soft);
    margin-bottom:8px;
    text-transform:uppercase;
  }
  .select-shell{
    position:relative;
  }
  select{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    background:rgba(9,10,26,0.55);
    border:1px solid rgba(212,175,55,0.5);
    color:var(--ivory);
    font-family:"Noto Serif TC", serif;
    font-size:16px;
    padding:13px 42px 13px 16px;
    border-radius:10px;
    cursor:pointer;
    transition:border-color .25s, box-shadow .25s;
  }
  select:hover, select:focus{
    outline:none;
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(212,175,55,0.15);
  }
  select option{ background:#1B1F3B; color:var(--ivory); }
  .select-shell::after{
    content:"▾";
    position:absolute;
    right:16px; top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    pointer-events:none;
    font-size:14px;
  }

  .cast-btn{
    display:block;
    width:100%;
    margin-top:8px;
    padding:16px 20px;
    font-family:"Cinzel", serif;
    font-size:16px;
    letter-spacing:2px;
    font-weight:600;
    color:var(--ink);
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    border:1px solid #a5822a;
    border-radius:999px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .25s ease;
    box-shadow:0 8px 24px -8px rgba(212,175,55,0.55);
  }
  .cast-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 0 1px rgba(212,175,55,0.6), 0 0 30px 4px rgba(212,175,55,0.55);
  }
  .cast-btn:active{ transform:translateY(0); }
  .cast-btn:disabled{
    opacity:0.6; cursor:not-allowed; transform:none;
    box-shadow:none;
  }

  .hint{
    text-align:center;
    margin-top:14px;
    font-size:13px;
    color:#9d9ac0;
    min-height:18px;
  }

  /* ---------- result area ---------- */
  #result{
    margin-top:46px;
  }
  .result-heading{
    text-align:center;
    font-family:"Cinzel", serif;
    font-size:13px;
    letter-spacing:5px;
    color:var(--gold-soft);
    text-transform:uppercase;
    margin-bottom:22px;
    opacity:0;
  }
  .result-heading.show{ opacity:1; transition:opacity .6s ease .1s; }

  .card{
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.5), transparent 40%),
      linear-gradient(180deg, var(--ivory), var(--ivory-shadow));
    color:#2a2416;
    border-radius:14px;
    padding:26px 26px 24px;
    margin-bottom:16px;
    box-shadow:0 18px 34px -16px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.25);
    position:relative;
    opacity:0;
    transform:translateY(16px) scaleY(0.96);
    transform-origin:top center;
    transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.3,1);
  }
  .card.show{ opacity:1; transform:translateY(0) scaleY(1); }
  .card::before{
    content:"";
    position:absolute; left:14px; right:14px; top:8px; bottom:8px;
    border:1px solid rgba(107,43,58,0.15);
    border-radius:8px;
    pointer-events:none;
  }
  .card h3{
    font-family:"Cinzel", serif;
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--wine);
    margin:0 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h3 .glyph{ font-size:18px; }
  .card p{ margin:0 0 8px; line-height:1.85; font-size:15.5px; }
  .card p:last-child{ margin-bottom:0; }
  .card .name-line{
    font-family:"Cinzel", serif;
    font-weight:600;
    font-size:19px;
    color:#3a2f1a;
    margin-bottom:6px;
  }
  .card ul{ margin:6px 0 0; padding-left:20px; line-height:1.9; }
  .card.title-card{
    text-align:center;
    background:
      radial-gradient(circle at 50% 0%, rgba(212,175,55,0.18), transparent 60%),
      linear-gradient(180deg, var(--ivory), var(--ivory-shadow));
  }
  .card.title-card .epithet{
    font-family:"Cinzel Decorative","Cinzel", serif;
    font-size:22px;
    color:var(--wine);
    letter-spacing:1px;
  }
  .duo{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media (max-width:560px){
    .duo{ grid-template-columns:1fr; }
  }

  footer{
    text-align:center;
    margin-top:52px;
    font-size:12px;
    letter-spacing:2px;
    color:#7a77a0;
  }

  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>

</div>

/* ===================== 星空背景 ===================== */
function makeStars(id, count, sizeRange, opacityRange, durRange){
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  const stars = Array.from({length:count}).map(()=>({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: sizeRange[0] + Math.random()*(sizeRange[1]-sizeRange[0]),
    baseOpacity: opacityRange[0] + Math.random()*(opacityRange[1]-opacityRange[0]),
    phase: Math.random()*Math.PI*2,
    speed: (durRange[0] + Math.random()*(durRange[1]-durRange[0]))
  }));

  function draw(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      const twinkle = 0.55 + 0.45*Math.sin(t/1000*s.speed + s.phase);
      ctx.beginPath();
      ctx.fillStyle = `rgba(247,243,233,${(s.baseOpacity*twinkle).toFixed(3)})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}
makeStars("stars", 160, [0.5,1.6], [0.3,0.9], [0.3,1]);

/* ===================== 漂浮魔法粒子 ===================== */
const particleHost = document.getElementById("particles");
function spawnParticle(){
  const p = document.createElement("div");
  p.className = "particle";
  const left = Math.random()*100;
  const duration = 8 + Math.random()*10;
  const delay = Math.random()*2;
  const size = 2 + Math.random()*2;
  p.style.left = left + "vw";
  p.style.bottom = "-10px";
  p.style.width = size + "px";
  p.style.height = size + "px";
  p.style.animationDuration = duration + "s";
  p.style.animationDelay = delay + "s";
  particleHost.appendChild(p);
  setTimeout(()=> p.remove(), (duration+delay)*1000 + 500);
}
setInterval(spawnParticle, 500);
for(let i=0;i<10;i++) setTimeout(spawnParticle, i*300);

/* ===================== 命運生成邏輯 ===================== */
const castBtn = document.getElementById("castBtn");
const hint = document.getElementById("hint");

const cards = [
  document.getElementById("cardZodiac"),
  document.getElementById("cardMbti"),
  document.getElementById("cardFusion"),
  document.getElementById("cardLove"),
  document.getElementById("cardCareer"),
  document.getElementById("cardTitle"),
];
const resultHeading = document.getElementById("resultHeading");

function uniqueMerge(...lists){
  const out = [];
  lists.flat().forEach(item=>{
    if(!out.includes(item)) out.push(item);
  });
  return out;
}

function revealResult(){
  resultHeading.classList.add("show");
  cards.forEach((card, i)=>{
    card.classList.remove("show");
    // force reflow then stagger
    void card.offsetWidth;
    setTimeout(()=> card.classList.add("show"), 90 + i*90);
  });
}

castBtn.addEventListener("click", ()=>{
  const zKey = zodiacSelect.value;
  const mKey = mbtiSelect.value;

  if(!zKey || !mKey){
    hint.textContent = "請先選擇你的星座與 MBTI，命運才能為你揭曉。";
    return;
  }
  hint.textContent = "";

  const z = zodiacData[zKey];
  const m = mbtiData[mKey];

  // 星座卡
  document.getElementById("zodiacGlyph").textContent = z.symbol;
  document.getElementById("zodiacName").textContent = z.name;
  document.getElementById("zodiacTrait").textContent = z.trait;

  // MBTI 卡
  document.getElementById("mbtiName").textContent = `${mKey}｜${m.title}`;
  document.getElementById("mbtiTrait").textContent = m.trait;

  // 融合人格
  document.getElementById("fusionText").textContent =
    `你是一位如「${z.epithet}」般的${m.title}。${z.trait}與${m.trait}相互交織，讓你在人群之中，既有${z.name}的直覺，也有${mKey}的理性架構，形成獨一無二的命運人格。`;

  const skills = uniqueMerge(z.skills, m.skills).slice(0,4);
  const skillsUl = document.getElementById("fusionSkills");
  skillsUl.innerHTML = "";
  skills.forEach(s=>{
    const li = document.createElement("li");
    li.textContent = s;
    skillsUl.appendChild(li);
  });

  // 愛情
  document.getElementById("loveText1").textContent = z.love;
  document.getElementById("loveText2").textContent = m.love;

  // 職業
  const careers = uniqueMerge(m.careers, z.careers).slice(0,4);
  const careerUl = document.getElementById("careerList");
  careerUl.innerHTML = "";
  careers.forEach(c=>{
    const li = document.createElement("li");
    li.textContent = c;
    careerUl.appendChild(li);
  });

  // 魔幻稱號
  document.getElementById("epithetText").textContent = `「${z.epithet}的${m.epithet}」`;

  revealResult();

  document.getElementById("result").scrollIntoView({behavior:"smooth", block:"start"});
});
</script>
